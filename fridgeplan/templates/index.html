<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fridge Planner</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#f2f7f4',
              100: '#e0ece4',
              400: '#5b9779',
              500: '#3f7d5c',
              600: '#33654a',
              700: '#294f3b',
            },
          },
        },
      },
    }
  </script>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900 antialiased">
  <main class="mx-auto max-w-xl px-4 py-10 sm:py-14">
    <div class="mb-8">
      <p class="text-sm font-medium tracking-wide text-brand-600">🧊 fridge&nbsp;→&nbsp;plan</p>
      <h1 class="mt-1 text-3xl font-bold tracking-tight">Fridge → Meal Plan</h1>
      <p class="mt-2 text-slate-600">
        Photo of your fridge in, meal plan (and shopping list, for what's missing) out.
      </p>
    </div>

    <form id="f" class="space-y-5 rounded-2xl border border-slate-200 bg-white p-6 shadow-sm">
      <div>
        <label class="block text-sm font-medium text-slate-700" for="tandoor_url">Tandoor URL</label>
        <input id="tandoor_url" name="tandoor_url" placeholder="https://recipes.example.com" required
          class="mt-1.5 w-full rounded-lg border border-slate-300 px-3 py-2 placeholder:text-slate-400
                 focus:border-brand-500 focus:outline-none focus:ring-2 focus:ring-brand-500/30">
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700" for="api_token">API token (read-write)</label>
        <input id="api_token" name="api_token" type="password" required
          class="mt-1.5 w-full rounded-lg border border-slate-300 px-3 py-2 font-mono text-sm
                 focus:border-brand-500 focus:outline-none focus:ring-2 focus:ring-brand-500/30">
        <p class="mt-1 text-xs text-slate-400">
          Kept only in this browser's storage — sent straight to your Tandoor, never stored on this server.
        </p>
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700" for="provider">Vision provider</label>
        <select id="provider" name="provider"
          class="mt-1.5 w-full rounded-lg border border-slate-300 bg-white px-3 py-2
                 focus:border-brand-500 focus:outline-none focus:ring-2 focus:ring-brand-500/30">
          <option value="anthropic">Anthropic (Claude)</option>
          <option value="openai">OpenAI</option>
          <option value="mistral">Mistral</option>
        </select>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-slate-700" for="days">Days</label>
          <input id="days" name="days" type="number" value="3" min="1" max="14"
            class="mt-1.5 w-full rounded-lg border border-slate-300 px-3 py-2
                   focus:border-brand-500 focus:outline-none focus:ring-2 focus:ring-brand-500/30">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700" for="meals_per_day">Meals/day</label>
          <input id="meals_per_day" name="meals_per_day" type="number" value="1" min="1" max="4"
            class="mt-1.5 w-full rounded-lg border border-slate-300 px-3 py-2
                   focus:border-brand-500 focus:outline-none focus:ring-2 focus:ring-brand-500/30">
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700" for="image">Fridge photo</label>
        <input id="image" name="image" type="file" accept="image/*" capture="environment" required
          class="mt-1.5 w-full rounded-lg border border-slate-300 text-sm
                 file:mr-3 file:rounded-md file:border-0 file:bg-brand-50 file:px-3 file:py-2
                 file:text-sm file:font-medium file:text-brand-700 hover:file:bg-brand-100
                 focus:border-brand-500 focus:outline-none focus:ring-2 focus:ring-brand-500/30">
      </div>

      <button type="submit"
        class="w-full rounded-lg bg-brand-600 px-4 py-2.5 font-semibold text-white transition
               hover:bg-brand-700 focus:outline-none focus:ring-2 focus:ring-brand-500/50 focus:ring-offset-2">
        Generate plan
      </button>
    </form>

    <pre id="out" hidden class="mt-6 whitespace-pre-wrap rounded-2xl border p-5 font-mono text-sm shadow-sm"></pre>
  </main>

<script>
const form = document.getElementById('f');
const out = document.getElementById('out');
const OUT_BASE = 'mt-6 whitespace-pre-wrap rounded-2xl border p-5 font-mono text-sm shadow-sm';
const OUT_NORMAL = OUT_BASE + ' border-slate-200 bg-white text-slate-700';
const OUT_ERROR = OUT_BASE + ' border-red-200 bg-red-50 text-red-700';

// remember url/token locally so you don't retype them every time
for (const k of ['tandoor_url', 'api_token', 'provider']) {
  const el = form.elements[k];
  el.value = localStorage.getItem(k) || '';
  el.addEventListener('change', () => localStorage.setItem(k, el.value));
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  out.hidden = false;
  out.className = OUT_NORMAL;
  out.textContent = 'Looking in your fridge...';
  try {
    const res = await fetch('/api/plan', { method: 'POST', body: new FormData(form) });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || res.statusText);
    out.textContent =
      `Recognized on hand: ${data.onhand_matched.join(', ') || '(none matched)'}\n\n` +
      `Meal plan:\n` + data.meals.map(m => `  ${m.date}: ${m.recipe}`).join('\n') +
      (data.meals.length ? '' : '  (no recipes could be scheduled)') +
      `\n\nShopping list: ${data.shopping_list_url}`;
  } catch (err) {
    out.className = OUT_ERROR;
    out.textContent = 'Error: ' + err.message;
  }
});
</script>
</body>
</html>
